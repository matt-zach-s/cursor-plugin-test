# action
name    = "superset_deployment_status"
timeout = "2m"

[[triggers]]
type = "manual"

[[steps]]
name = "get_deployment_status"
inline_contents = """
#!/usr/bin/env sh
set -eu
kubectl get deploy -n superset -o wide
response=`kubectl get deploy -n superset -o json | jq -c`
echo $response >> $NUON_ACTIONS_OUTPUT_FILEPATH
"""
