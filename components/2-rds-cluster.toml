# terraform
name              = "rds_cluster"
type              = "terraform_module"
terraform_version = "1.11.3"

[public_repo]
repo      = "your-org/your-infra-repo"
directory = "nuon/components/rds-postgres"
branch    = "main"

[vars]
name_prefix        = "superset-{{ .nuon.install.id }}"
engine             = "postgres"
engine_version     = "15"
instance_class     = "{{ .nuon.inputs.inputs.rds_instance_class }}"
allocated_storage  = "{{ .nuon.inputs.inputs.rds_allocated_storage_gb }}"
database_name      = "{{ .nuon.inputs.inputs.db_name }}"
username           = "{{ .nuon.inputs.inputs.db_username }}"
password           = "{{ .nuon.inputs.inputs.db_password }}"
vpc_id             = "{{ .nuon.install.sandbox.outputs.vpc.id }}"
private_subnet_ids = "{{ .nuon.install.sandbox.outputs.vpc.private_subnet_ids }}"
